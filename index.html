<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#e4002b"/>
<title>e& Academy 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>

<!-- Firebase SDK (compat version) -->

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

<style>
:root{
 --red:#e4002b;--red2:#ff1744;--reddim:rgba(228,0,43,.13);
 --dark:#07080f;--dark2:#0d0e1a;--dark3:#12141f;--card:#161824;
 --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
 --text:#f1f5f9;--muted:#6b7a99;--muted2:#9aa5b8;
 --green:#00d68f;--amber:#ffb300;--blue:#00b4d8;--purple:#7c3aed;
 --xp:#ffd700;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;direction:rtl;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e2030;border-radius:99px}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}60%{transform:translateY(-7px)}}
@keyframes pop{0%{transform:scale(0) rotate(-15deg)}65%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.4)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(110vh) rotate(720deg) scale(.5);opacity:0}}
@keyframes levelUp{0%{transform:scale(0) rotate(-20deg);opacity:0}50%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 10px var(--red)}50%{box-shadow:0 0 28px var(--red),0 0 50px rgba(228,0,43,.3)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}

.fu{animation:fadeUp .4s ease both}

/* LOADING */
#loadingScreen{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loader{width:42px;height:42px;border:3px solid rgba(228,0,43,.2);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite}

/* BUTTONS */
.btn{border:none;border-radius:14px;padding:13px 22px;font-family:'Cairo',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn-red{background:linear-gradient(135deg,var(--red),#c8001f);color:#fff;box-shadow:0 4px 20px rgba(228,0,43,.35)}
.btn-red:hover{box-shadow:0 6px 28px rgba(228,0,43,.55);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.05);border:1.5px solid var(--border);color:var(--muted2)}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:var(--text)}
.btn-xp{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0800;box-shadow:0 4px 18px rgba(255,180,0,.4)}
.btn-green{background:linear-gradient(135deg,var(--green),#00a870);color:#000;box-shadow:0 4px 18px rgba(0,214,143,.35)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:10px}

/* INPUTS */
.inp{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:13px;padding:13px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;outline:none;transition:all .2s;direction:rtl}
.inp:focus{border-color:var(--red);background:rgba(228,0,43,.05);box-shadow:0 0 0 3px rgba(228,0,43,.08)}
.inp::placeholder{color:#3a4560}
textarea.inp{resize:vertical;min-height:80px}
select.inp{cursor:pointer;color-scheme:dark}
select.inp option{background:var(--dark2);color:var(--text);padding:10px}
.fgroup{margin-bottom:13px}
.fgroup label{display:block;color:var(--muted2);font-size:11px;font-weight:800;margin-bottom:7px}

/* LAYOUT */
.sidebar{width:252px;background:var(--dark2);border-left:1px solid var(--border);padding:14px 0;display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:100;transition:transform .3s}
.sb-logo{padding:4px 16px 16px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sb-logo span{font-size:20px;font-weight:900;color:var(--red)}
.nav-lbl{color:var(--muted);font-size:9px;font-weight:800;letter-spacing:.08em;padding:0 10px;margin:8px 0 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:13px;cursor:pointer;transition:all .2s;color:#9aa5b8;font-size:13px;font-weight:700;margin:1px 8px}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-item.active{background:var(--reddim);color:var(--red);border:1px solid rgba(228,0,43,.2)}
.nav-item .ni{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-footer{margin-top:auto;padding:12px 10px 0;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:13px;background:rgba(255,255,255,.04)}
.u-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;background:linear-gradient(135deg,var(--red),#c8001f);position:relative}
.u-level-badge{position:absolute;bottom:-4px;right:-4px;background:var(--xp);color:#1a0800;font-size:8px;font-weight:900;padding:1px 5px;border-radius:99px;border:2px solid var(--dark2)}

.main{margin-right:252px;padding:22px;min-height:100vh;position:relative;z-index:1}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.pg-title{font-size:20px;font-weight:900}
.pg-sub{font-size:12px;color:var(--muted2);margin-top:3px}

/* XP */
.xp-popup{position:fixed;font-size:18px;font-weight:900;color:var(--xp);pointer-events:none;z-index:999;text-shadow:0 2px 8px rgba(0,0,0,.5);animation:xpFloat 1.2s ease forwards}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:998;animation:confettiFall linear forwards}
.xp-bar-wrap{background:rgba(255,255,255,.06);border-radius:99px;height:10px;overflow:hidden;position:relative}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--xp),#ff8c00);transition:width .8s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 10px rgba(255,215,0,.5)}

/* HERO */
.hero-card{background:linear-gradient(135deg,rgba(228,0,43,.18),rgba(228,0,43,.06),rgba(124,58,237,.1));border:1px solid rgba(228,0,43,.25);border-radius:24px;padding:22px;margin-bottom:20px;position:relative;overflow:hidden}

/* COURSE CARDS */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:22px}
.c-card{border-radius:22px;border:1px solid var(--border);background:var(--card);overflow:hidden;cursor:pointer;transition:all .28s;position:relative}
.c-card:hover{border-color:rgba(228,0,43,.35);transform:translateY(-5px) scale(1.02);box-shadow:0 14px 40px rgba(0,0,0,.4)}
.c-thumb{height:110px;display:flex;align-items:center;justify-content:center;font-size:54px;position:relative;overflow:hidden}
.c-thumb-glow{position:absolute;inset:0;opacity:.3;filter:blur(20px);transform:scale(1.5)}
.c-body{padding:14px;position:relative;z-index:2}
.pbar{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),#ff6b6b);transition:width .6s ease}

/* LESSON */
.lesson-layout{display:grid;grid-template-columns:1fr 285px;gap:18px;align-items:start}
.video-wrap{border-radius:18px;overflow:hidden;background:#000;aspect-ratio:16/9}
.video-wrap iframe{width:100%;height:100%;border:none;display:block}
.video-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,#0d0e1a,#161824);cursor:pointer;border-radius:18px;aspect-ratio:16/9}
.play-btn{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--red),#c8001f);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 30px rgba(228,0,43,.6);transition:transform .2s;animation:glow 2s ease-in-out infinite}
.lessons-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:sticky;top:20px}
.lp-head{padding:14px 16px;border-bottom:1px solid var(--border)}
.lesson-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.lesson-row:hover:not(.locked){background:rgba(255,255,255,.04)}
.lesson-row.active{background:var(--reddim);border-right:3px solid var(--red)}
.lesson-row.locked{opacity:.35;cursor:not-allowed}
.l-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .3s}
.l-check.done{background:var(--green);border-color:var(--green);color:#000;animation:pop .4s ease}
.l-check.cur{border-color:var(--red);color:var(--red);background:var(--reddim)}

/* EXAM */
.exam-wrap{max-width:580px;margin:0 auto}
.e-opt{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;cursor:pointer;text-align:right;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .22s}
.e-opt:hover:not(:disabled){background:rgba(255,255,255,.07);border-color:var(--border2);transform:translateX(-3px)}
.e-opt.selected{background:var(--reddim);border-color:rgba(228,0,43,.4);color:var(--red)}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:99px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:20px;width:90%;max-width:500px;animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto}

/* TOAST */
#toastArea{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1001;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--dark2);border:1px solid var(--green);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:700;color:var(--text);box-shadow:0 8px 20px rgba(0,0,0,.2);animation:fadeUp .3s ease}

/* UTILS */
.trow{display:grid;grid-template-columns:1fr 100px 100px;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center}
.trow.hdr{background:rgba(255,255,255,.03);font-weight:700;color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.stat-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.streak-day{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto 4px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted2)}
.streak-day.done{background:var(--green);border-color:var(--green);color:#000}
.streak-day.today{border-color:var(--red);color:var(--red);background:var(--reddim)}
.streak-day.miss{opacity:.5}

/* Mob burger */
/* UPLOAD */
.upload-area{border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.upload-area:hover,.upload-area.drag{border-color:var(--red);background:var(--reddim)}
.upload-area input[type=file]{display:none}
.upload-progress{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:10px}
.upload-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),#ff6b6b);transition:width .3s ease}
.upload-preview{max-width:100%;max-height:160px;border-radius:10px;margin-top:10px;object-fit:cover}

.mob-burger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:18px}

/* ROLE CARDS */
@keyframes roleIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:20px}
.role-card{border-radius:16px;padding:16px 10px;cursor:pointer;transition:all .25s;border:2px solid var(--border);background:rgba(255,255,255,.03);text-align:center;animation:roleIn .4s ease both}
.role-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.role-card.selected{transform:scale(1.04)}
.role-card .rc-icon{font-size:30px;margin-bottom:7px}
.role-card .rc-label{font-size:12px;font-weight:800}
.role-card .rc-sub{font-size:9px;color:var(--muted2);margin-top:2px}

/* RESPONSIVE */
@media (max-width: 768px) {
 .mob-burger{display:flex}
 .sidebar{transform:translateX(100%);width:280px;border-left:none;box-shadow:0 0 30px rgba(0,0,0,.3)}
 .sidebar.mob-open{transform:translateX(0)}
 .main{margin-right:0;padding:16px;padding-top:54px}
 .lesson-layout{grid-template-columns:1fr;gap:14px}
 .lessons-panel{position:static}
 .topbar{flex-direction:column;align-items:flex-start}
}
</style>

</head>
<body>

<div id="loadingScreen">
 <div class="loader"></div>
 <div style="font-size:12px;color:var(--muted2)">جاري التحميل...</div>
</div>

<div id="appShell" style="display:none">
 <button class="mob-burger" onclick="toggleMob()">☰</button>

 <div class="sidebar" id="sidebar">
   <div class="sb-logo">
     <span>e&</span>
     <span style="font-size:14px;font-weight:700;color:var(--text)">Academy</span>
     <span style="margin-right:auto;font-size:18px">🚀</span>
   </div>
   <div class="nav-lbl">القائمة</div>
   <div id="navItems"></div>


<div class="sb-footer">
 <div class="user-chip">
   <div class="u-av" id="uAvTxt">
     <span id="uAvChar">?</span>
     <div class="u-level-badge" id="uLvlBadge">1</div>
   </div>
   <div style="flex:1;min-width:0">
     <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="uName"></div>
     <div style="font-size:10px;color:var(--muted2)" id="uRole"></div>
   </div>
 </div>
 <div style="height:10px"></div>
 <div class="xp-bar-wrap">
   <div class="xp-bar-fill" id="sbXpFill" style="width:0%"></div>
 </div>
 <div style="display:flex;justify-content:space-between;margin-top:6px">
   <div style="font-size:9px;color:var(--muted2)" id="sbXpTxt">0/200 XP</div>
   <div style="font-size:9px;color:var(--muted2)" id="sbLvlTxt">المستوى 1</div>
 </div>
 <div style="height:14px"></div>
 <button class="btn btn-ghost" style="width:100%;margin-bottom:6px" onclick="showChangePassModal()">🔑 تغيير كلمة السر</button>
 <button class="btn btn-ghost" style="width:100%" onclick="logout()">تسجيل الخروج</button>
</div>


 </div>

 <div class="main" id="mainArea"></div>
</div>

<!-- LOGIN -->

<div id="loginScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;max-width:420px;margin:0 auto;text-align:center">
 <div style="font-size:32px;font-weight:900;color:var(--red);letter-spacing:-1px;margin-bottom:4px">e& <span style="color:var(--text)">Academy</span> 🚀</div>
 <div style="font-size:12px;color:var(--muted2);margin-bottom:24px">منصة تدريب خدمة العملاء</div>

 <!-- STEP 1: اختيار الدور -->

 <div id="roleStep" style="width:100%">
   <div style="font-size:11px;font-weight:800;color:var(--muted2);margin-bottom:12px;text-align:right">اختر نوع حسابك أولاً</div>
   <div class="role-cards">
     <div class="role-card" id="rc_trainee" onclick="selectLoginRole('trainee')" style="animation-delay:.05s;border-color:rgba(0,214,143,.3);background:rgba(0,214,143,.06)">
       <div class="rc-icon">🎓</div>
       <div class="rc-label" style="color:var(--green)">متدرب</div>
       <div class="rc-sub">Trainee</div>
     </div>
     <div class="role-card" id="rc_trainer" onclick="selectLoginRole('trainer')" style="animation-delay:.1s;border-color:rgba(0,180,216,.3);background:rgba(0,180,216,.06)">
       <div class="rc-icon">👨‍🏫</div>
       <div class="rc-label" style="color:var(--blue)">مدرب</div>
       <div class="rc-sub">Trainer</div>
     </div>
     <div class="role-card" id="rc_admin" onclick="selectLoginRole('admin')" style="animation-delay:.15s;border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.06)">
       <div class="rc-icon">⚙️</div>
       <div class="rc-label" style="color:var(--purple)">مدير</div>
       <div class="rc-sub">Admin</div>
     </div>
   </div>
 </div>

 <!-- STEP 2: فورم الدخول -->

 <div id="loginFormStep" style="width:100%;display:none">
   <div id="roleHeader" style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:16px;text-align:right">
     <span id="roleHeaderIcon" style="font-size:24px"></span>
     <div style="flex:1">
       <div id="roleHeaderLabel" style="font-size:13px;font-weight:800"></div>
       <div id="roleHeaderSub" style="font-size:10px;color:var(--muted2)"></div>
     </div>
     <button onclick="resetLoginRole()" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted2);cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;padding:4px 10px">↩ تغيير</button>
   </div>
   <div class="fgroup" style="text-align:right">
     <label>اسم المستخدم</label>
     <input class="inp" id="username" placeholder="اسم المستخدم" onkeydown="if(event.key==='Enter')doLogin()"/>
   </div>
   <div class="fgroup" style="text-align:right">
     <label>كلمة المرور</label>
     <input class="inp" id="password" type="password" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()"/>
   </div>
   <div id="loginErr" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none;text-align:right"></div>
   <button class="btn btn-red" id="loginBtn" style="width:100%" onclick="doLogin()">دخول 🚀</button>
 </div>

 <div style="font-size:10px;color:var(--muted);margin-top:20px">e& Academy · منصة تدريب خدمة العملاء</div>
</div>

<div id="overlay"></div>
<div id="toastArea"></div>
<div id="xpArea"></div>

const auth = firebase.auth();

// ============================================================
// FIREBASE HELPERS

async function fbGet(path) {

 return snap.val();

async function fbSet(path, value) {

async function fbUpdate(path, value) {
 await db.ref(path).update(value);
}

// رفع ملف على Firebase Storage مع شريط تقدم
function uploadFile(file, folder, progressBarId) {
 return new Promise((resolve, reject) => {
   const ext = file.name.split('.').pop();
   const filename = folder + '/' + Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
   const ref = storage.ref(filename);
   const task = ref.put(file);

   task.on('state_changed',
     snap => {
       const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
       const bar = document.getElementById(progressBarId);
       if (bar) bar.style.width = pct + '%';
       const label = document.getElementById(progressBarId + '_label');
       if (label) label.textContent = 'جاري الرفع... ' + pct + '%';
     },
     err => reject(err),
     async () => {
       const url = await task.snapshot.ref.getDownloadURL();
       resolve(url);
     }
   );
 });
}

async function doLogin() {
 if (!S.selectedLoginRole) { showErr('اختر نوع حسابك أولاً.'); return; }

 const usernameEl = document.getElementById('username');
 const passwordEl = document.getElementById('password');
 const loginBtn   = document.getElementById('loginBtn');
 const errEl      = document.getElementById('loginErr');

 const username = usernameEl.value.trim();
 const password = passwordEl.value.trim();
 errEl.style.display = 'none';

 if (!username || !password) { showErr('أكمل اسم المستخدم وكلمة المرور.', errEl); return; }

 loginBtn.disabled = true;
 loginBtn.textContent = 'جاري الدخول...';

 try {
   const email = username + '@lms.internal';
   await auth.signInWithEmailAndPassword(email, password);
   const userData = await fbGet('users/' + username);

   if (!userData) {
     await auth.signOut();
     showErr('المستخدم غير موجود في النظام.', errEl);
     loginBtn.disabled = false; loginBtn.textContent = 'دخول 🚀'; return;
   }

   // التحقق أن الدور المختور يطابق الحساب
   const expectedRole = ROLE_INFO[S.selectedLoginRole].dbRole;
   if (userData.role !== expectedRole) {
     await auth.signOut();
     showErr('هذا الحساب مسجل كـ "' + (ROLE_LABELS[userData.role]||userData.role) + '" وليس ' + ROLE_INFO[S.selectedLoginRole].label + '.', errEl);
     loginBtn.disabled = false; loginBtn.textContent = 'دخول 🚀'; return;
   }

   await afterLogin(username, userData);

 } catch (e) {
   const msgs = {
     'auth/wrong-password':     'كلمة المرور غلط.',
     'auth/user-not-found':     'المستخدم غير موجود.',
     'auth/invalid-email':      'بيانات دخول غير صحيحة.',
     'auth/too-many-requests':  'محاولات كثيرة، حاول بعد شوية.',
     'auth/invalid-credential': 'اسم المستخدم أو كلمة المرور غير صحيحة.',
   };
   showErr(msgs[e.code] || 'اسم المستخدم أو كلمة المرور غير صحيحة.', errEl);
   loginBtn.disabled = false; loginBtn.textContent = 'دخول 🚀';
 }
}

 };

 const fbCourses = await fbGet('courses');

   COURSES = Object.values(fbCourses);

 await logLogin(username, userData);

   S.user.badges.push('first_login');

 setState({ screen: 'home' });
}

async function gainXP(amount, srcEl) {
 if (!S.user) return;
 const oldLv = Math.floor((S.user.xp || 0) / 200) + 1;
 S.user.xp = (S.user.xp || 0) + amount;
 const newLv = Math.floor(S.user.xp / 200) + 1;
 S.user.level = newLv;
 showXpPopup(amount, srcEl);
 await fbUpdate('users/' + S.ukey, { xp: S.user.xp, level: newLv });
 if (newLv > oldLv) {
   setTimeout(() => { launchConfetti(); showLevelUp(newLv); }, 300);
 }
 updateXpBar();
}

function getRandMsg(k) {
 const a = MASCOT_MSGS[k] || MASCOT_MSGS.home;
 return a[Math.floor(Math.random() * a.length)];
}

function getFirstName(n) {
 return n ? n.split(' ')[0] : '';
}

function showErr(msg, el) {
 const target = el || document.getElementById('loginErr');
 if (target) { target.textContent = msg; target.style.display = 'block'; }
}

 if (!lesson) return `<div style="padding:30px;text-align:center;color:var(--muted2)">الدرس غير موجود.</div>`;

 const lessonProg = (S.user.progress[course.id] || {})[lessonId];
 const isDone = lessonProg === 100;

 let mediaHtml = '';
 if (lesson.type === 'امتحان' && lesson.exam) {
   mediaHtml = `<div style="background:var(--card);border-radius:18px;padding:30px;text-align:center;border:1px solid var(--border)">
     <div style="font-size:48px;margin-bottom:14px">📝</div>
     <div style="font-size:18px;font-weight:900;margin-bottom:8px">${lesson.title}</div>
     <div style="font-size:12px;color:var(--muted2);margin-bottom:20px">${lesson.exam.questions.length} أسئلة · حد النجاح ${lesson.exam.passScore}%</div>
     ${isDone ? `<div class="tag" style="background:rgba(0,214,143,.15);color:var(--green);font-size:12px;padding:8px 16px;margin-bottom:14px">✅ اجتزت هذا الاختبار</div><br>` : ''}
     <button class="btn btn-red" onclick="startExam('${course.id}','${lessonId}')">
       ${isDone ? '🔄 إعادة الاختبار' : '🚀 ابدأ الاختبار'}
     </button>
   </div>`;
 } else if (lesson.yt) {
   mediaHtml = `<div class="video-wrap"><iframe src="${lesson.yt}" allowfullscreen></iframe></div>`;
 } else if (lesson.pdf) {
   mediaHtml = `<div style="border-radius:18px;overflow:hidden;height:480px;border:1px solid var(--border)"><iframe src="${lesson.pdf}" style="width:100%;height:100%;border:none"></iframe></div>`;
 } else if (lesson.img) {
   mediaHtml = `<div style="border-radius:18px;overflow:hidden;border:1px solid var(--border);text-align:center;background:var(--card)"><img src="${lesson.img}" style="max-width:100%;max-height:500px;object-fit:contain;display:block;margin:0 auto"/></div>`;
 } else {
   mediaHtml = `<div style="background:var(--card);border-radius:18px;padding:30px;text-align:center;border:1px solid var(--border);color:var(--muted2)">لا يوجد محتوى مرفق</div>`;
 }

 return `
   <div style="margin-bottom:14px">${mediaHtml}</div>
   <div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px">
     <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
       <div style="font-size:16px;font-weight:800;flex:1">${lesson.title}</div>
       ${isDone ? `<span class="tag" style="background:rgba(0,214,143,.15);color:var(--green)">✅ مكتمل</span>` : ''}
     </div>

     <div style="display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--border)">
       <div style="font-size:11px;color:var(--muted2)">⏱ ${lesson.duration || ''} &nbsp;·&nbsp; ⭐ ${lesson.xp || 0} XP</div>
       ${lesson.type !== 'امتحان' ? `<button class="btn ${isDone ? 'btn-ghost' : 'btn-red'} btn-sm" onclick="completeLesson('${course.id}','${lessonId}',this)">
         ${isDone ? '✓ مكتمل' : 'أكمل الدرس ✓'}
       </button>` : ''}
     </div>
   </div>`;
}

async function completeLesson(courseId, lessonId, el) {
 if (!S.user) return;
 const course = COURSES.find(c => c.id === courseId);
 const lesson = (course?.lessons || []).find(l => l.id === lessonId);
 if (!course || !lesson) return;

 const already = (S.user.progress[courseId] || {})[lessonId] === 100;
 if (already) { showToast('ℹ️', 'هذا الدرس مكتمل بالفعل!', 'var(--blue)'); return; }

 if (!S.user.progress[courseId]) S.user.progress[courseId] = {};
 S.user.progress[courseId][lessonId] = 100;

 const total = (course.lessons || []).length;
 const done = Object.values(S.user.progress[courseId]).filter(v => v === 100).length;
 const pct = Math.round((done / total) * 100);
 S.user.progress[courseId]._overall = pct;

 await gainXP(lesson.xp || 0, el);
 await fbUpdate('users/' + S.ukey, { progress: S.user.progress });

 if (pct >= 100 && !S.user.badges.includes('course_master')) {
   S.user.badges.push('course_master');
   await fbUpdate('users/' + S.ukey, { badges: S.user.badges });
   setTimeout(() => { launchConfetti(); showToast('🏆', 'حصلت على شارة "خبير كورس"!', 'var(--xp)'); }, 500);
 }

 showToast('✅', 'تم إكمال الدرس! +' + (lesson.xp || 0) + ' XP');
 renderApp();
}

function startExam(courseId, lessonId) {
 const course = COURSES.find(c => c.id === courseId);
 const lesson = (course?.lessons || []).find(l => l.id === lessonId);
 if (!lesson?.exam) return;
 S.currentExam = { courseId, lessonId, questions: lesson.exam.questions, passScore: lesson.exam.passScore, currentQ: 0, answers: [] };
 setState({ screen: 'exam' });
}

function renderExam() {
 if (!S.currentExam) return `<div>لا يوجد اختبار حالي.</div>`;
 const ex = S.currentExam;
 const q = ex.questions[ex.currentQ];
 const course = COURSES.find(c => c.id === ex.courseId);

 return `<div class="fu">
 <div class="topbar">
   <div><div class="pg-title">📝 اختبار: ${course?.title || ''}</div>
   <div class="pg-sub">السؤال ${ex.currentQ + 1} من ${ex.questions.length}</div></div>
   <button class="btn btn-ghost btn-sm" onclick="setState({screen:'course',courseId:'${ex.courseId}'})">❌ إلغاء</button>
 </div>

 <div class="exam-wrap">
   <div style="display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap">
     ${ex.questions.map((_, i) => `
       <div style="width:34px;height:34px;border-radius:50%;border:2px solid ${i === ex.currentQ ? 'var(--red)' : ex.answers[i] !== undefined ? 'var(--green)' : 'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:pointer;color:${i === ex.currentQ ? 'var(--red)' : ex.answers[i] !== undefined ? 'var(--green)' : 'var(--muted2)'};background:${i === ex.currentQ ? 'var(--reddim)' : ex.answers[i] !== undefined ? 'rgba(0,214,143,.1)' : 'transparent'}" onclick="S.currentExam.currentQ=${i};renderApp()">${i + 1}</div>
     `).join('')}
   </div>

   <div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;margin-bottom:16px">
     <div style="font-size:16px;font-weight:800;margin-bottom:18px;line-height:1.5">${ex.currentQ + 1}. ${q.q}</div>
     ${q.options.map((opt, i) => `
       <button class="e-opt ${ex.answers[ex.currentQ] === i ? 'selected' : ''}" onclick="pickOpt(${i})">
         <span style="width:24px;height:24px;border-radius:50%;border:2px solid ${ex.answers[ex.currentQ] === i ? 'var(--red)' : 'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;background:${ex.answers[ex.currentQ] === i ? 'var(--red)' : 'transparent'};color:${ex.answers[ex.currentQ] === i ? '#fff' : 'var(--muted2)'}">${String.fromCharCode(65 + i)}</span>
         ${opt}
       </button>
     `).join('')}
   </div>

   <div style="display:flex;justify-content:space-between;gap:10px">
     <button class="btn btn-ghost" ${ex.currentQ === 0 ? 'disabled' : ''} onclick="prevQuestion()">← السابق</button>
     ${ex.currentQ < ex.questions.length - 1
       ? `<button class="btn btn-red" ${ex.answers[ex.currentQ] === undefined ? 'disabled' : ''} onclick="nextQuestion()">التالي ←</button>`
       : `<button class="btn btn-green" ${ex.answers[ex.currentQ] === undefined ? 'disabled' : ''} onclick="submitExam()">✅ إنهاء الاختبار</button>`}
   </div>
 </div>
 </div>`;
}

function pickOpt(i) {
 S.currentExam.answers[S.currentExam.currentQ] = i;
 renderApp();
}
function nextQuestion() { S.currentExam.currentQ++; renderApp(); }
function prevQuestion() { S.currentExam.currentQ--; renderApp(); }

async function submitExam() {
 const ex = S.currentExam;
 if (!ex) return;
 let correct = 0;
 ex.questions.forEach((q, i) => { if (ex.answers[i] === q.ans) correct++; });
 ex.score = Math.round((correct / ex.questions.length) * 100);

 if (!S.user.scores) S.user.scores = {};
 S.user.scores[ex.courseId] = ex.score;

 if (ex.score >= ex.passScore) {
   if (!S.user.progress[ex.courseId]) S.user.progress[ex.courseId] = {};
   S.user.progress[ex.courseId][ex.lessonId] = 100;

   const course = COURSES.find(c => c.id === ex.courseId);
   const lesson = (course?.lessons || []).find(l => l.id === ex.lessonId);
   await gainXP(lesson?.xp || 20);
   launchConfetti();

   if (ex.score === 100 && !S.user.badges.includes('exam_ace')) {
     S.user.badges.push('exam_ace');
     setTimeout(() => showToast('🎯', 'شارة جديدة: "متفوق في الامتحانات"!', 'var(--xp)'), 800);
   }
 }

 await fbUpdate('users/' + S.ukey, { scores: S.user.scores, progress: S.user.progress, badges: S.user.badges });
 setState({ screen: 'result', examResult: { ...ex } });
}

function renderResult() {
 const res = S.examResult;
 if (!res) return `<div>لا توجد نتائج.</div>`;
 const course = COURSES.find(c => c.id === res.courseId);
 const passed = res.score >= (res.passScore || 0);
 const correct = res.questions.filter((q, i) => res.answers[i] === q.ans).length;

 return `<div class="fu" style="max-width:600px;margin:0 auto">
 <div style="text-align:center;margin-bottom:24px">

// ============================================================
// TRACKING (manager)
// ============================================================
async function renderTracking() {
 const allUsers = await fbGet('users') || {};
 const emps = Object.entries(allUsers).filter(([, v]) => v.role === 'employee');
 const filter = S.trackFilter || '';
 const status = S.trackStatus || 'all';

 const getProgPct = (u) => COURSES.length > 0 ? Math.round(COURSES.reduce((a, c) => a + ((u.progress || {})[c.id] || 0), 0) / COURSES.length) : 0;
 const getAvgScore = (u) => {
   const vals = Object.values(u.scores || {});
   return vals.length > 0 ? Math.round(vals.reduce((a, v) => a + v, 0) / vals.length) : 0;
 };

 let filtered = emps.filter(([key, u]) => {
   const matchText = !filter || (u.name || '').toLowerCase().includes(filter.toLowerCase()) || key.includes(filter.toLowerCase());
   const pct = getProgPct(u);
   const matchStatus = status === 'all' ? true : status === 'done' ? pct >= 100 : status === 'late' ? pct < 30 : status === 'active' ? pct >= 30 && pct < 100 : true;
   return matchText && matchStatus;
 });

 const lateCount = emps.filter(([, u]) => getProgPct(u) < 30).length;

 const html = `<div class="fu">
 <div class="topbar">
   <div><div class="pg-title">📊 لوحة المتابعة</div><div class="pg-sub">تقدم الTraineeين في الوقت الحقيقي</div></div>
   ${S.role === 'content' ? `<button class="btn btn-red btn-sm" onclick="exportExcel()">📥 Excel</button>` : ''}
 </div>

 <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
   ${[
     ['var(--red)', emps.length, '👥 الTraineeون'],
     ['var(--green)', emps.filter(([, u]) => getProgPct(u) >= 100).length, '✅ أتموا الكل'],
     ['var(--xp)', emps.length > 0 ? Math.round(emps.reduce((a, [, u]) => a + (u.xp || 0), 0) / emps.length) : 0, '⭐ متوسط XP'],
     ['var(--red)', lateCount, '⚠️ متأخرون'],
   ].map(s => `<div class="stat-card" style="border-color:${s[0]}33;background:${s[0]}0d">
     <div style="font-size:26px;font-weight:900;color:${s[0]}">${s[1]}</div>
     <div style="font-size:10px;color:#7a8aaa;margin-top:4px">${s[2]}</div>
   </div>`).join('')}
 </div>

 <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
   <input type="text" placeholder="🔍 ابحث باسم الTrainee..." value="${filter}"
     oninput="S.trackFilter=this.value;renderTracking()"
     style="flex:1;min-width:180px;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none"/>
   <select onchange="S.trackStatus=this.value;renderTracking()"
     style="padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Cairo',sans-serif;font-size:13px">
     <option value="all" ${status === 'all' ? 'selected' : ''}>الكل</option>
     <option value="done" ${status === 'done' ? 'selected' : ''}>✅ أتموا الكل</option>
     <option value="active" ${status === 'active' ? 'selected' : ''}>🔥 نشطون</option>
     <option value="late" ${status === 'late' ? 'selected' : ''}>⚠️ متأخرون</option>
   </select>
   ${lateCount > 0 ? `<button class="btn btn-sm" style="background:#ff444422;color:#ff4444;border:1px solid #ff444433;white-space:nowrap" onclick="notifyLate()">🔔 تنبيه المتأخرين (${lateCount})</button>` : ''}
 </div>

 <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden">
   <div style="display:grid;grid-template-columns:1fr 70px 70px 90px 80px;gap:10px;padding:12px 16px;background:rgba(255,255,255,.03);font-weight:700;color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.05em">
     <div>الTrainee</div><div style="text-align:center">XP</div><div style="text-align:center">النتيجة</div><div style="text-align:center">التقدم</div><div style="text-align:center">عرض</div>
   </div>
   ${filtered.length === 0 ? `<div style="padding:30px;text-align:center;color:var(--muted2)">لا توجد نتائج</div>` :
   filtered.map(([key, u]) => {
     const pct = getProgPct(u);
     const avg = getAvgScore(u);
     const isLate = pct < 30;
     return `<div style="display:grid;grid-template-columns:1fr 70px 70px 90px 80px;gap:10px;padding:12px 16px;border-top:1px solid var(--border);align-items:center;${isLate ? 'border-right:3px solid #ff4444' : ''}">
       <div style="display:flex;align-items:center;gap:9px">
         <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--red),#c8001f);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0">${(u.name || '?').charAt(0)}</div>
         <div>
           <div style="font-weight:700;font-size:13px">${u.name || 'غير معروف'}</div>
           <div style="font-size:9px;color:#7a8aaa">Lv${u.level || 1} 🔥${u.streak || 0}${isLate ? ' · <span style="color:#ff4444">متأخر ⚠️</span>' : ''}</div>
         </div>
       </div>
       <div style="text-align:center;color:var(--xp);font-weight:800;font-size:13px">${u.xp || 0}</div>
       <div style="text-align:center;font-weight:800;font-size:13px;color:${avg >= 80 ? 'var(--green)' : avg > 0 ? 'var(--amber)' : 'var(--muted)'}">${avg || '—'}${avg ? '%' : ''}</div>
       <div>
         <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
         <div style="font-size:9px;color:var(--muted2);margin-top:2px">${pct}%</div>
       </div>
       <div style="text-align:center">
         <button class="btn btn-ghost btn-sm" onclick='showUserModal(${JSON.stringify(u).replace(/'/g, "&#39;")})'>عرض</button>
       </div>
     </div>`;
   }).join('')}
 </div>
 </div>`;
 document.getElementById('mainArea').innerHTML = html;
}

function toggleLessonFields(prefix) {
const type = document.getElementById(prefix + '_type')?.value;
const map = { 'فيديو': prefix+'_yt_section', 'نص': prefix+'_pdf_section', 'صورة': prefix+'_img_section' };
// اخفي كل الـ sections
[prefix+'_yt_section', prefix+'_pdf_section', prefix+'_img_section'].forEach(id => {
const el = document.getElementById(id);
if (el) el.style.display = 'none';
});
// فقط ظهّر اللي المفروض يظهر
const target = map[type];
if (target) {
const el = document.getElementById(target);
if (el) el.style.display = 'block';
}
}

function previewFile(input, previewId, type) {
const file = input.files[0]; if (!file) return;
const prev = document.getElementById(previewId); if (!prev) return;
if (type === 'image') { prev.src = URL.createObjectURL(file); prev.style.display = 'block'; }
else if (type === 'video') { prev.src = URL.createObjectURL(file); prev.style.display = 'block'; }
else if (type === 'pdf') { prev.textContent = '✅ ' + file.name + ' (' + (file.size/1024/1024).toFixed(1) + ' MB)'; prev.style.display = 'block'; }
}

function handleFileDrop(event, inputId, previewId, type) {
const file = event.dataTransfer.files[0]; if (!file) return;
const input = document.getElementById(inputId);
const dt = new DataTransfer(); dt.items.add(file); input.files = dt.files;
previewFile(input, previewId, type);
}

async function saveChangePass() {

async function logLogin(username, prevData) {
const today = new Date().toLocaleDateString('ar-EG');
const updates = { lastLogin: today };

const lastDate = prevData?.lastLogin;
if (lastDate) {
const last = new Date(lastDate.split('/').reverse().join('-'));
const diff = Math.floor((new Date() - last) / 86400000);
if (diff === 1) {
updates.streak = (prevData.streak || 0) + 1;
S.user.streak = updates.streak;
if (updates.streak >= 7 && !S.user.badges.includes('streak_7')) {
S.user.badges.push('streak_7');
updates.badges = S.user.badges;
setTimeout(() => showToast('🔥', 'حصلت على شارة “سلسلة 7 أيام”!', 'var(–xp)'), 1200);
}
} else if (diff > 1) {
updates.streak = 1;
S.user.streak = 1;
}
} else {
updates.streak = 1;
S.user.streak = 1;
}

await fbUpdate('users/' + username, updates);
await fbSet('loginLogs/' + username + '_' + Date.now(), { user: username, time: new Date().toISOString() });
}

const emps = Object.entries(allUsers).filter(([, v]) => v.role === 'employee');
const late = emps.filter(([, u]) => COURSES.length > 0 && COURSES.reduce((a, c) => a + ((u.progress || {})[c.id] || 0), 0) / COURSES.length < 30);

if (late.length === 0) { showToast('✅', 'لا يوجد Traineeين متأخرين!'); return; }

const now = new Date().toLocaleDateString('ar-EG');
await Promise.all(late.map(([key]) =>
fbUpdate('users/' + key, {
notification: { msg: '⚠️ تنبيه: لم تكمل الكورسات المطلوبة بعد. يرجى الاستمرار في التعلم.', from: S.name, date: now, read: false }
})
));
showToast('🔔', 'تم إرسال تنبيه لـ ' + late.length + ' Trainee');
}

// ============================================================
// EXPORT EXCEL
// ============================================================
async function exportExcel() {
const allUsers = await fbGet('users') || {};
const emps = Object.entries(allUsers).filter(([, v]) => v.role === 'employee');
const BOM = '\uFEFF';
const NL = '\n';
const headers = ['الاسم', 'اسم الدخول', 'الدور', 'المستوى', 'XP', 'متوسط النتيجة', 'التقدم %', 'الشارات', 'السلسلة', 'آخر دخول'];
const rows = emps.map(([key, u]) => {
const scores = Object.values(u.scores || {});
const avg = scores.length > 0 ? Math.round(scores.reduce((a, v) => a + v, 0) / scores.length) : 0;
const pct = COURSES.length > 0 ? Math.round(COURSES.reduce((a, c) => a + ((u.progress || {})[c.id] || 0), 0) / COURSES.length) : 0;
return [u.name || '—', key, ROLE_LABELS[u.role] || u.role, u.level || 1, u.xp || 0, avg + '%', pct + '%', (u.badges || []).length, u.streak || 0, u.lastLogin || '—'];
});
let csv = BOM + headers.join(',') + NL + rows.map(r => r.map(v => `"${v}"`).join(',')).join(NL);
const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url; a.download = 'eand_report_' + Date.now() + '.csv'; a.click();
URL.revokeObjectURL(url);
showToast('📥', 'تم التصدير بنجاح!');
}
