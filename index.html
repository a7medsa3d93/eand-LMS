<style>
/* ===== THEME VARIABLES ===== */
:root,[data-theme="dark"]{
 --red:#e4002b;--red2:#ff1744;--reddim:rgba(228,0,43,.13);
 --dark:#07080f;--dark2:#0d0e1a;--dark3:#12141f;--card:#161824;
 --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
 --text:#f1f5f9;--muted:#6b7a99;--muted2:#9aa5b8;
 --green:#00d68f;--amber:#ffb300;--blue:#00b4d8;--purple:#7c3aed;
 --xp:#ffd700;--bg-body:#07080f;--sidebar-bg:#0d0e1a;
 --card-bg:#161824;--inp-bg:rgba(255,255,255,.05);--shadow:rgba(0,0,0,.4);
}
[data-theme="light"]{
 --dark:#f0f4f8;--dark2:#ffffff;--dark3:#e8ecf0;--card:#ffffff;
 --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
 --text:#0f1523;--muted:#8090a8;--muted2:#5a6880;
 --bg-body:#f0f4f8;--sidebar-bg:#ffffff;--card-bg:#ffffff;
 --inp-bg:rgba(0,0,0,.04);--shadow:rgba(0,0,0,.12);--reddim:rgba(228,0,43,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg-body);color:var(--text);min-height:100vh;direction:rtl;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e2030;border-radius:99px}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}60%{transform:translateY(-7px)}}
@keyframes pop{0%{transform:scale(0) rotate(-15deg)}65%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.4)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(110vh) rotate(720deg) scale(.5);opacity:0}}
@keyframes levelUp{0%{transform:scale(0) rotate(-20deg);opacity:0}50%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 10px var(--red)}50%{box-shadow:0 0 28px var(--red),0 0 50px rgba(228,0,43,.3)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes timerPulse{0%,100%{color:var(--red);transform:scale(1)}50%{color:#ff4444;transform:scale(1.08)}}
@keyframes roleIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

.fu{animation:fadeUp .4s ease both}

/* ===== LOADING ===== */
#loadingScreen{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loader{width:42px;height:42px;border:3px solid rgba(228,0,43,.2);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite}

/* ===== BUTTONS ===== */
.btn{border:none;border-radius:14px;padding:13px 22px;font-family:'Cairo',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn-red{background:linear-gradient(135deg,var(--red),#c8001f);color:#fff;box-shadow:0 4px 20px rgba(228,0,43,.35)}
.btn-red:hover{box-shadow:0 6px 28px rgba(228,0,43,.55);transform:translateY(-1px)}
.btn-ghost{background:var(--inp-bg);border:1.5px solid var(--border);color:var(--muted2)}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:var(--text)}
.btn-xp{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0800;box-shadow:0 4px 18px rgba(255,180,0,.4)}
.btn-green{background:linear-gradient(135deg,var(--green),#00a870);color:#000;box-shadow:0 4px 18px rgba(0,214,143,.35)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:10px}

/* ===== INPUTS ===== */
.inp{width:100%;background:var(--inp-bg);border:1.5px solid var(--border);border-radius:13px;padding:13px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;outline:none;transition:all .2s;direction:rtl}
.inp:focus{border-color:var(--red);background:rgba(228,0,43,.05);box-shadow:0 0 0 3px rgba(228,0,43,.08)}
.inp::placeholder{color:#3a4560}
textarea.inp{resize:vertical;min-height:80px}
select.inp{cursor:pointer;color-scheme:dark}
select.inp option{background:var(--dark2);color:var(--text);padding:10px}
.fgroup{margin-bottom:13px}
.fgroup label{display:block;color:var(--muted2);font-size:11px;font-weight:800;margin-bottom:7px}

/* ===== SIDEBAR ===== */
.sidebar{width:252px;background:var(--sidebar-bg);border-left:1px solid var(--border);padding:14px 0;display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:100;transition:transform .3s,background .3s}
.sb-logo{padding:4px 16px 16px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sb-logo span{font-size:20px;font-weight:900;color:var(--red)}
.nav-lbl{color:var(--muted);font-size:9px;font-weight:800;letter-spacing:.08em;padding:0 10px;margin:8px 0 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:13px;cursor:pointer;transition:all .2s;color:#9aa5b8;font-size:13px;font-weight:700;margin:1px 8px}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-item.active{background:var(--reddim);color:var(--red);border:1px solid rgba(228,0,43,.2)}
.nav-item .ni{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-footer{margin-top:auto;padding:12px 10px 0;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:13px;background:rgba(255,255,255,.04)}
.u-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;background:linear-gradient(135deg,var(--red),#c8001f);position:relative}
.u-level-badge{position:absolute;bottom:-4px;right:-4px;background:var(--xp);color:#1a0800;font-size:8px;font-weight:900;padding:1px 5px;border-radius:99px;border:2px solid var(--dark2)}

/* ===== MAIN LAYOUT ===== */
.main{margin-right:252px;padding:22px;min-height:100vh;position:relative;z-index:1}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.pg-title{font-size:20px;font-weight:900;word-break:break-word;overflow-wrap:break-word}
.pg-sub{font-size:12px;color:var(--muted2);margin-top:3px}

/* ===== XP & CONFETTI ===== */
.xp-popup{position:fixed;font-size:18px;font-weight:900;color:var(--xp);pointer-events:none;z-index:999;text-shadow:0 2px 8px rgba(0,0,0,.5);animation:xpFloat 1.2s ease forwards}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:998;animation:confettiFall linear forwards}
.xp-bar-wrap{background:rgba(255,255,255,.06);border-radius:99px;height:10px;overflow:hidden;position:relative}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--xp),#ff8c00);transition:width .8s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 10px rgba(255,215,0,.5)}

/* ===== HERO CARD ===== */
.hero-card{background:linear-gradient(135deg,rgba(228,0,43,.18),rgba(228,0,43,.06),rgba(124,58,237,.1));border:1px solid rgba(228,0,43,.25);border-radius:24px;padding:22px;margin-bottom:20px;position:relative;overflow:hidden}

/* ===== COURSES GRID ===== */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:22px}
.c-card{border-radius:22px;border:1px solid var(--border);background:var(--card-bg);overflow:hidden;cursor:pointer;transition:all .28s;position:relative}
.c-card:hover{border-color:rgba(228,0,43,.35);transform:translateY(-5px) scale(1.02);box-shadow:0 14px 40px var(--shadow)}
.c-thumb{height:110px;display:flex;align-items:center;justify-content:center;font-size:54px;position:relative;overflow:hidden}
.c-thumb-glow{position:absolute;inset:0;opacity:.3;filter:blur(20px);transform:scale(1.5)}
.c-body{padding:14px;position:relative;z-index:2}
.pbar{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),#ff6b6b);transition:width .6s ease}

/* ===== LESSON LAYOUT ===== */
.lesson-layout{display:grid;grid-template-columns:1fr 285px;gap:18px;align-items:start}
.video-wrap{border-radius:18px;overflow:hidden;background:#000;aspect-ratio:16/9}
.video-wrap iframe{width:100%;height:100%;border:none;display:block}
.video-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,#0d0e1a,#161824);cursor:pointer;border-radius:18px;aspect-ratio:16/9}
.play-btn{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--red),#c8001f);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 30px rgba(228,0,43,.6);transition:transform .2s;animation:glow 2s ease-in-out infinite}
.lessons-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:sticky;top:20px}
.lp-head{padding:14px 16px;border-bottom:1px solid var(--border)}
.lesson-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.lesson-row:hover:not(.locked){background:rgba(255,255,255,.04)}
.lesson-row.active{background:var(--reddim);border-right:3px solid var(--red)}
.lesson-row.locked{opacity:.35;cursor:not-allowed}
.l-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .3s}
.l-check.done{background:var(--green);border-color:var(--green);color:#000;animation:pop .4s ease}
.l-check.cur{border-color:var(--red);color:var(--red);background:var(--reddim)}

/* ===== EXAM ===== */
.exam-wrap{max-width:580px;margin:0 auto}
.e-opt{width:100%;background:var(--inp-bg);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;cursor:pointer;text-align:right;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .22s}
.e-opt:hover:not(:disabled){background:rgba(255,255,255,.07);border-color:var(--border2);transform:translateX(-3px)}
.e-opt.selected{background:var(--reddim);border-color:rgba(228,0,43,.4);color:var(--red)}

/* ===== EXAM TIMER ===== */
.exam-timer{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:14px;background:var(--card-bg);border:1px solid var(--border);font-weight:900;font-size:16px;margin-bottom:16px}
.exam-timer.warning{border-color:rgba(255,179,0,.4);background:rgba(255,179,0,.08);color:var(--amber)}
.exam-timer.danger{border-color:rgba(228,0,43,.4);background:rgba(228,0,43,.08);color:var(--red);animation:timerPulse 1s ease-in-out infinite}

/* ===== TAGS ===== */
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:99px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:20px;width:90%;max-width:500px;animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto}

/* ===== TOAST ===== */
#toastArea{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1001;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--dark2);border:1px solid var(--green);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:700;color:var(--text);box-shadow:0 8px 20px rgba(0,0,0,.2);animation:fadeUp .3s ease}

/* ===== TABLES ===== */
.trow{display:grid;grid-template-columns:1fr 100px 100px;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center}
.trow.hdr{background:rgba(255,255,255,.03);font-weight:700;color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.stat-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}

/* ===== STREAK ===== */
.streak-day{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto 4px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted2)}
.streak-day.done{background:var(--green);border-color:var(--green);color:#000}
.streak-day.today{border-color:var(--red);color:var(--red);background:var(--reddim)}
.streak-day.miss{opacity:.5}

/* ===== UPLOAD ===== */
.upload-area{border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.upload-area:hover,.upload-area.drag{border-color:var(--red);background:var(--reddim)}
.upload-area input[type=file]{display:none}
.upload-progress{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:10px}
.upload-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),#ff6b6b);transition:width .3s ease}

/* ===== MOBILE ===== */
.mob-burger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:18px}

/* ===== EXAM BUILDER ===== */
.exam-builder{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:10px}
.question-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;position:relative}
.question-card .q-num{position:absolute;top:-10px;right:14px;background:var(--red);color:#fff;font-size:10px;font-weight:900;padding:2px 10px;border-radius:99px}
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.opt-row .opt-letter{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--muted2);flex-shrink:0}
.opt-row input[type=radio]{accent-color:var(--green);width:16px;height:16px;flex-shrink:0;cursor:pointer}
.opt-row .inp{margin-bottom:0}
.correct-badge{background:rgba(0,214,143,.15);color:var(--green);font-size:9px;font-weight:800;padding:2px 8px;border-radius:99px;white-space:nowrap}

/* ===== SCORES ===== */
.scores-table{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.scores-header{display:grid;gap:8px;padding:12px 16px;background:rgba(255,255,255,.03);font-weight:700;color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.scores-row{display:grid;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background .2s}
.scores-row:hover{background:rgba(255,255,255,.02)}
.score-pill{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800;min-width:46px}
.score-pill.pass{background:rgba(0,214,143,.15);color:var(--green)}
.score-pill.fail{background:rgba(228,0,43,.12);color:var(--red)}
.score-pill.none{background:rgba(255,255,255,.05);color:var(--muted2)}

/* ===== ONLINE STATUS ===== */
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.offline{background:var(--muted)}

/* ===== ROLE CARDS ===== */
.role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:20px}
.role-card{border-radius:16px;padding:16px 10px;cursor:pointer;transition:all .25s;border:2px solid var(--border);background:rgba(255,255,255,.03);text-align:center;animation:roleIn .4s ease both}
.role-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.role-card.selected{transform:scale(1.04)}
.role-card .rc-icon{font-size:30px;margin-bottom:7px}
.role-card .rc-label{font-size:12px;font-weight:800}
.role-card .rc-sub{font-size:9px;color:var(--muted2);margin-top:2px}

/* ===== THEME TOGGLE ===== */
.theme-btn{background:none;border:1.5px solid var(--border);border-radius:10px;padding:6px 10px;cursor:pointer;font-size:16px;color:var(--text);transition:all .2s}
.theme-btn:hover{background:var(--inp-bg);border-color:var(--border2)}
.lang-btn{background:none;border:1.5px solid var(--border);border-radius:10px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:800;font-family:'Cairo',sans-serif;color:var(--text);transition:all .2s}
.lang-btn:hover{background:var(--inp-bg)}

/* ===== CERTIFICATE ===== */
.cert-preview{background:linear-gradient(135deg,#1a0800,#0d0e1a);border:2px solid var(--xp);border-radius:20px;padding:30px;text-align:center;position:relative;overflow:hidden}
.cert-preview::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,215,0,.08),transparent 70%);pointer-events:none}

/* ===== ANALYTICS ===== */
.chart-wrap{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.chart-canvas-wrap{position:relative;height:220px}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
 .mob-burger{display:flex}
 .sidebar{transform:translateX(100%);width:280px;border-left:none;box-shadow:0 0 30px rgba(0,0,0,.3)}
 .sidebar.mob-open{transform:translateX(0)}
 .main{margin-right:0;padding:16px;padding-top:54px}
 .lesson-layout{grid-template-columns:1fr;gap:14px}
 .lessons-panel{position:static}
 .topbar{flex-direction:column;align-items:flex-start}
 .pg-title{word-break:break-word;overflow-wrap:break-word}
 .c-card .c-body{word-break:break-word;overflow-wrap:break-word}
 .user-chip > div:nth-child(2){word-break:break-word;overflow-wrap:break-word;min-width:0}
 .modal-box{width:95%;padding:16px}
 .role-cards{grid-template-columns:repeat(3,1fr);gap:6px}
}
</style>

</head>

// ============================================================
// SOUND EFFECTS (Web Audio API — no external files)
// ============================================================
let _audioCtx = null;
function getAudioCtx() {
 if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 return _audioCtx;
}
function playTone(freq, duration, type = 'sine', vol = 0.15) {
 try {
   const ctx = getAudioCtx();
   const osc = ctx.createOscillator();
   const gain = ctx.createGain();
   osc.connect(gain); gain.connect(ctx.destination);
   osc.type = type; osc.frequency.value = freq;
   gain.gain.setValueAtTime(vol, ctx.currentTime);
   gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
   osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
 } catch(e) {}
}
function playXpSound() {

// ============================================================
// YouTube URL normalizer
// ============================================================
function normalizeYouTubeUrl(url) {
 if (!url) return '';
 url = url.trim();
 if (url.includes('youtube.com/embed/')) return url;
 let videoId = null;
 let m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
 if (m) videoId = m[1];
 if (!videoId) { m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if (m) videoId = m[1]; }
 if (!videoId) { m = url.match(/\/shorts\/([a-zA-Z0-9_-]{11})/); if (m) videoId = m[1]; }
 if (!videoId) { m = url.match(/\/embed\/([a-zA-Z0-9_-]{11})/); if (m) videoId = m[1]; }
 if (videoId) return 'https://www.youtube.com/embed/' + videoId;
 return url;
}

function uploadFile(file, folder, progressBarId) {
 return new Promise((resolve, reject) => {
   const ext = file.name.split('.').pop();
   const filename = folder + '/' + Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
   const ref = storage.ref(filename);
   const task = ref.put(file);
   task.on('state_changed',
     snap => {
       const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
       const bar = document.getElementById(progressBarId);
       if (bar) bar.style.width = pct + '%';
       const label = document.getElementById(progressBarId + '_label');
       if (label) label.textContent = 'جاري الرفع... ' + pct + '%';
     },
     err => reject(err),
     async () => { const url = await task.snapshot.ref.getDownloadURL(); resolve(url); }
   );
 });
}

function loadScript(src) {
 return new Promise((res, rej) => {
   if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
   const s = document.createElement('script');
   s.src = src; s.onload = res; s.onerror = rej;
   document.head.appendChild(s);
 });
}
async function ensureChartJs() {
 await loadScript('https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js');
}
async function ensureJsPDF() {

// ============================================================
// INTERSECTION OBSERVER (Lazy load images/videos)
// ============================================================
const lazyObserver = typeof IntersectionObserver !== 'undefined'
 ? new IntersectionObserver((entries) => {
     entries.forEach(entry => {
       if (entry.isIntersecting) {
         const el = entry.target;
         if (el.dataset.src) { el.src = el.dataset.src; delete el.dataset.src; lazyObserver.unobserve(el); }
         if (el.dataset.yt) {
           const iframe = document.createElement('iframe');
           iframe.src = el.dataset.yt;
           iframe.allowFullscreen = true;
           iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
           iframe.style.width = '100%'; iframe.style.height = '100%'; iframe.style.border = 'none';
           el.innerHTML = '';
           el.appendChild(iframe);
           lazyObserver.unobserve(el);
         }

// ============================================================
// doLogin
// ============================================================
async function doLogin() {
 if (!S.selectedLoginRole) { showErr('اختر نوع حسابك أولاً.'); return; }
 const usernameEl = document.getElementById('username');
 const passwordEl = document.getElementById('password');
 const loginBtn   = document.getElementById('loginBtn');
 const errEl      = document.getElementById('loginErr');
 const username   = usernameEl.value.trim();
 const password   = passwordEl.value.trim();
 errEl.style.display = 'none';
 if (!username || !password) { showErr('أكمل اسم المستخدم وكلمة المرور.', errEl); return; }
 loginBtn.disabled = true;
 loginBtn.textContent = 'جاري الدخول...';
 S._loginInProgress = true;
 try {
   await auth.signOut().catch(() => {});
   const email = username + '@lms.internal';
   await auth.signInWithEmailAndPassword(email, password);
   const userData = await fbGet('users/' + username);
   if (!userData) {
     await auth.signOut();
     showErr('المستخدم غير موجود في النظام.', errEl);
     loginBtn.disabled = false; loginBtn.innerHTML = '<span class="t" data-k="login">دخول</span> 🚀';
     S._loginInProgress = false; return;
   }
   const expectedRole = ROLE_INFO[S.selectedLoginRole].dbRole;
   if (userData.role !== expectedRole) {
     await auth.signOut();
     showErr('هذا الحساب مسجل كـ "' + (ROLE_LABELS[userData.role] || userData.role) + '" وليس ' + ROLE_INFO[S.selectedLoginRole].label + '.', errEl);
     loginBtn.disabled = false; loginBtn.innerHTML = '<span class="t" data-k="login">دخول</span> 🚀';
     S._loginInProgress = false; return;
   }
   S._loggedIn = true;
   await afterLogin(username, userData);
 } catch (e) {
   const msgs = {
     'auth/wrong-password': 'كلمة المرور غلط.',
     'auth/user-not-found': 'المستخدم غير موجود.',
     'auth/invalid-email': 'بيانات دخول غير صحيحة.',
     'auth/too-many-requests': 'محاولات كثيرة، حاول بعد شوية.',
     'auth/invalid-credential': 'اسم المستخدم أو كلمة المرور غير صحيحة.',
   };
   showErr(msgs[e.code] || 'اسم المستخدم أو كلمة المرور غير صحيحة.', errEl);
   loginBtn.disabled = false; loginBtn.innerHTML = '<span class="t" data-k="login">دخول</span> 🚀';
   S._loginInProgress = false;
 }
}

async function afterLogin(username, userData) {
 S.ukey = username; S.role = userData.role; S.name = userData.name;
 S.user = {
   ...userData, xp: userData.xp || 0, level: userData.level || 1,
   streak: userData.streak || 0, badges: userData.badges || [],
   progress: userData.progress || {}, scores: userData.scores || {},
   examResults: userData.examResults || {}, examAttempts: userData.examAttempts || {},
 };
 const fbCourses = await fbGet('courses');
 if (fbCourses) {
   COURSES = Object.values(fbCourses);
 } else {
   COURSES = JSON.parse(JSON.stringify(COURSES_DEFAULT));
   for (const c of COURSES) await fbSet('courses/' + c.id, c);
 }
 await logLogin(username, userData);
 await loadNotification(username);
 setupPresence(username);
 // Track visitor stats
 trackVisit(username);
 if (!S.user.badges.includes('first_login')) {
   S.user.badges.push('first_login');
   await fbUpdate('users/' + username, { badges: S.user.badges });
   setTimeout(() => showToast('👋', 'حصلت على شارة "أول تسجيل دخول"!', 'var(--xp)'), 1000);
 }
 S._loginInProgress = false;
 setState({ screen: 'home' });
}

async function logout() {
 if (S.ukey) {
   await fbUpdate('users/' + S.ukey, { status: 'offline' }).catch(()=>{});
 }
 if (S._examTimerInterval) { clearInterval(S._examTimerInterval); S._examTimerInterval = null; }
 try { await auth.signOut(); } catch (e) {}
 Object.assign(S, {
   screen: 'login', user: null, ukey: null, role: null, name: null,
   notification: null, courseId: null, currentLessonId: null,
   currentExam: null, examResult: null, selectedLoginRole: null,
   _loggedIn: false, _loginInProgress: false, examQuestions: [], _examTimerInterval: null,
 });
 resetLoginRole();
 renderApp();
}

async function trackVisit(username) {
 const now = new Date();
 const monthKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
 const dayKey = now.toISOString().split('T')[0];
 await fbUpdate('stats/visitors/' + monthKey, { [username]: true });
 await fbUpdate('stats/daily/' + dayKey, { [username]: true });
}

// ============================================================
// SAFE PROGRESS HELPER (fixes NaN%)
// ============================================================
function getCourseProgress(u, courseId) {
 const val = (u.progress || {})[courseId];
 if (val && typeof val === 'object') {
   return typeof val._overall === 'number' ? val._overall : 0;
 }
 const num = parseFloat(val);
 return isNaN(num) ? 0 : Math.min(100, Math.max(0, num));
}

function getProgPct(u) {
 if (!COURSES || COURSES.length === 0) return 0;
 const total = COURSES.reduce((a, c) => a + getCourseProgress(u, c.id), 0);
 return Math.round(total / COURSES.length);
}

function renderLessonContent(course, lessonId) {
 const lesson = (course.lessons || []).find(l => l.id === lessonId);
 if (!lesson) return `<div style="padding:30px;text-align:center;color:var(--muted2)">الدرس غير موجود.</div>`;
 const lessonProgObj = (S.user.progress[course.id] || {});
 const isDone = lessonProgObj[lessonId] === 100;
 const courseIsDone = getCourseProgress(S.user, course.id) >= 100;

 let mediaHtml = '';
 if (lesson.type === 'امتحان' && lesson.exam) {
   // Check attempts
   const attempts = (S.user.examAttempts || {})[lessonId] || [];
   const maxA = lesson.exam.maxAttempts || 0;
   const attemptsLeft = maxA > 0 ? maxA - attempts.length : null;
   const canTake = attemptsLeft === null || attemptsLeft > 0;
   mediaHtml = `<div style="background:var(--card-bg);border-radius:18px;padding:30px;text-align:center;border:1px solid var(--border)">
     <div style="font-size:48px;margin-bottom:14px">📝</div>
     <div style="font-size:18px;font-weight:900;margin-bottom:8px;word-break:break-word">${lesson.title}</div>
     <div style="font-size:12px;color:var(--muted2);margin-bottom:6px">${lesson.exam.questions.length} أسئلة · حد النجاح ${lesson.exam.passScore}%</div>
     ${lesson.exam.examTime ? `<div style="font-size:12px;color:var(--amber);margin-bottom:6px">⏱ مدة الاختبار: ${lesson.exam.examTime} دقيقة</div>` : ''}
     ${maxA > 0 ? `<div style="font-size:12px;color:var(--muted2);margin-bottom:10px">المحاولات المتبقية: ${attemptsLeft !== null ? attemptsLeft : '∞'}</div>` : ''}
     ${isDone?`<div class="tag" style="background:rgba(0,214,143,.15);color:var(--green);font-size:12px;padding:8px 16px;margin-bottom:14px">✅ اجتزت هذا الاختبار</div><br>`:''}
     ${attempts.length > 0 ? `<div style="margin-bottom:14px"><button class="btn btn-ghost btn-sm" onclick="showAttemptsModal('${course.id}','${lessonId}')">📋 عرض المحاولات السابقة (${attempts.length})</button></div>` : ''}
     ${canTake
       ? `<button class="btn btn-red" onclick="startExam('${course.id}','${lessonId}')">${isDone?'🔄 إعادة الاختبار':'🚀 ابدأ الاختبار'}</button>`
       : `<div style="background:rgba(228,0,43,.1);border:1px solid rgba(228,0,43,.2);border-radius:12px;padding:12px;color:var(--red);font-size:13px">❌ تجاوزت الحد المسموح من المحاولات (${maxA})</div>`
     }
   </div>`;
 } else if (lesson.yt) {
   const ytEmbed = normalizeYouTubeUrl(lesson.yt);
   mediaHtml = `<div class="video-wrap"><div data-yt="${ytEmbed}" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;min-height:200px">
     <div class="play-btn" style="cursor:pointer" onclick="this.parentElement.innerHTML='<iframe src=${JSON.stringify(ytEmbed)} allowfullscreen allow=accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture style=width:100%;height:100%;border:none></iframe>'">▶</div>
   </div></div>`;
 } else if (lesson.pdf) {
   mediaHtml = `<div style="border-radius:18px;overflow:hidden;height:480px;border:1px solid var(--border)"><iframe src="${lesson.pdf}" style="width:100%;height:100%;border:none"></iframe></div>`;
 } else if (lesson.img) {
   mediaHtml = `<div style="border-radius:18px;overflow:hidden;border:1px solid var(--border);text-align:center;background:var(--card-bg)"><img data-src="${lesson.img}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="max-width:100%;max-height:500px;object-fit:contain;display:block;margin:0 auto"/></div>`;
 } else if (lesson.ppt) {
   const encodedUrl = encodeURIComponent(lesson.ppt);
   mediaHtml = `<div style="border-radius:18px;overflow:hidden;height:500px;border:1px solid var(--border)">
     <iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodedUrl}" style="width:100%;height:100%;border:none"></iframe>
   </div>`;
 } else if (lesson.audio) {
   mediaHtml = `<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:30px;text-align:center">
     <div style="font-size:56px;margin-bottom:16px;animation:float 3s ease-in-out infinite">🎧</div>
     <audio controls style="width:100%;max-width:480px;border-radius:10px"><source src="${lesson.audio}">متصفحك لا يدعم الصوت.</audio>
   </div>`;
 } else if (lesson.file) {
   mediaHtml = `<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:40px;text-align:center">
     <div style="font-size:64px;margin-bottom:16px">📎</div>

     <a href="${lesson.file}" target="_blank" download class="btn btn-red" style="text-decoration:none;display:inline-flex">📥 تحميل الملف</a>
   </div>`;
 } else {
   mediaHtml = `<div style="background:var(--card-bg);border-radius:18px;padding:30px;text-align:center;border:1px solid var(--border);color:var(--muted2)">لا يوجد محتوى مرفق</div>`;
 }

 return `
   <div style="margin-bottom:14px">${mediaHtml}</div>
   <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:16px">
     <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
       <div style="font-size:16px;font-weight:800;flex:1;word-break:break-word">${lesson.title}</div>
       ${isDone?`<span class="tag" style="background:rgba(0,214,143,.15);color:var(--green)">✅ مكتمل</span>`:''}
     </div>
     <div style="font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:14px;word-break:break-word">${lesson.desc||''}</div>
     <div style="display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px">
       <div style="font-size:11px;color:var(--muted2)">⏱ ${lesson.duration||''} &nbsp;·&nbsp; ⭐ ${lesson.xp||0} XP</div>
       <div style="display:flex;gap:8px;flex-wrap:wrap">
         ${lesson.type !== 'امتحان' ? `<button class="btn ${isDone?'btn-ghost':'btn-red'} btn-sm" onclick="completeLesson('${course.id}','${lessonId}',this)">
           ${isDone?'✓ مكتمل':'أكمل الدرس ✓'}
         </button>` : ''}
         ${courseIsDone ? `<button class="btn btn-xp btn-sm" onclick="downloadCertificate('${course.id}')">🎓 الشهادة</button>` : ''}
       </div>
     </div>
   </div>`;
}

async function completeLesson(courseId, lessonId, el) {
 if (!S.user) return;
 const course = COURSES.find(c => c.id === courseId);
 const lesson = (course?.lessons||[]).find(l => l.id === lessonId);
 if (!course || !lesson) return;
 const already = ((S.user.progress[courseId]||{})[lessonId]) === 100;
 if (already) { showToast('ℹ️','هذا الدرس مكتمل بالفعل!','var(--blue)'); return; }
 if (!S.user.progress[courseId]) S.user.progress[courseId] = {};
 S.user.progress[courseId][lessonId] = 100;
 const total = (course.lessons||[]).length;
 const done = Object.keys(S.user.progress[courseId]).filter(k => k !== '_overall' && S.user.progress[courseId][k] === 100).length;
 const pct = Math.round((done/total)*100);
 S.user.progress[courseId]._overall = pct;
 await gainXP(lesson.xp||0, el);
 playCompleteSound();
 await fbUpdate('users/'+S.ukey, { progress: S.user.progress });
 if (pct >= 100) {
   if (!S.user.badges.includes('course_master')) {
     S.user.badges.push('course_master');
     await fbUpdate('users/'+S.ukey, { badges: S.user.badges });
     setTimeout(() => { launchConfetti(); showToast('🏆','حصلت على شارة "خبير كورس"!','var(--xp)'); }, 500);
   }
   // Check if all courses done
   const allDone = COURSES.every(c => getCourseProgress(S.user, c.id) >= 100);
   if (allDone && !S.user.badges.includes('customer_hero')) {
     S.user.badges.push('customer_hero');
     await fbUpdate('users/'+S.ukey, { badges: S.user.badges });
     setTimeout(() => showToast('🌟','حصلت على شارة "بطل خدمة العملاء"!','var(--xp)'), 800);
   }
 }
 showToast('✅','تم إكمال الدرس! +'+(lesson.xp||0)+' XP');
 renderApp();
}

function switchCertTab(tab) {
 const isUrl = tab === 'url';
 document.getElementById('certUploadSection').style.display = isUrl ? 'none' : 'block';
 document.getElementById('certUrlSection').style.display = isUrl ? 'block' : 'none';
 document.getElementById('certTabUpload').className = 'btn btn-sm ' + (isUrl ? 'btn-ghost' : 'btn-red');
 document.getElementById('certTabUrl').className = 'btn btn-sm ' + (isUrl ? 'btn-red' : 'btn-ghost');
}

function previewCertImg(input) {
 const file = input.files[0]; if (!file) return;
 const wrap = document.getElementById('cert_img_preview_wrap');
 const img = document.getElementById('cert_img_preview');
 img.src = URL.createObjectURL(file);
 wrap.style.display = 'block';
}

function previewCertUrl() {
 const url = document.getElementById('cert_url_inp')?.value.trim();
 if (!url) return;
 const wrap = document.getElementById('cert_url_preview_wrap');
 const img = document.getElementById('cert_url_preview');
 img.src = url; img.style.display = 'block'; wrap.style.display = 'block';
}

function previewCertificate() {
 const isUrl = document.getElementById('certUrlSection')?.style.display !== 'none';
 let imgSrc = '';
 if (isUrl) {
   imgSrc = document.getElementById('cert_url_inp')?.value.trim() || '';
 } else {
   const file = document.getElementById('cert_img_file')?.files[0];
   if (file) imgSrc = URL.createObjectURL(file);
   else imgSrc = document.getElementById('cert_img_preview')?.src || '';
 }
 if (!imgSrc) { showToast('⚠️','اختر صورة الشهادة أولاً','var(--amber)'); return; }

 const xPct    = parseFloat(document.getElementById('cert_name_x')?.value) || 50;
 const yPct    = parseFloat(document.getElementById('cert_name_y')?.value) || 58;
 const fontSize = parseInt(document.getElementById('cert_font_size')?.value) || 48;
 const color   = document.getElementById('cert_font_color')?.value || '#1a1a1a';
 const font    = document.getElementById('cert_font_family')?.value || 'Cairo';
 const name    = S.user?.name || 'اسم المتدرب';

 const previewDiv = document.getElementById('cert_live_preview');
 const previewImg = document.getElementById('cert_preview_img');
 const canvas    = document.getElementById('cert_preview_canvas');
 previewDiv.style.display = 'block';
 previewImg.src = imgSrc;
 previewImg.onload = () => {
   const W = previewImg.offsetWidth || previewImg.naturalWidth;
   const H = previewImg.offsetHeight || previewImg.naturalHeight;
   canvas.width = W; canvas.height = H;
   const ctx = canvas.getContext('2d');
   ctx.clearRect(0, 0, W, H);
   const scaledFont = Math.round(fontSize * (W / (previewImg.naturalWidth || W)));
   ctx.font = `bold ${scaledFont}px "${font}", Cairo, sans-serif`;
   ctx.fillStyle = color;
   ctx.textAlign = 'center';
   ctx.textBaseline = 'middle';
   ctx.fillText(name, W * (xPct/100), H * (yPct/100));
 };
}

async function saveCertSettings() {
 const btn = document.getElementById('cert_save_btn');
 const errEl = document.getElementById('cert_save_err');
 errEl.style.display = 'none';
 const isUrl = document.getElementById('certUrlSection')?.style.display !== 'none';
 let imageUrl = '';

 btn.disabled = true; btn.textContent = 'جاري الحفظ...';
 try {
   if (isUrl) {
     imageUrl = document.getElementById('cert_url_inp')?.value.trim();
     if (!imageUrl) { errEl.textContent = '⚠️ أدخل رابط الصورة'; errEl.style.display='block'; btn.disabled=false; btn.textContent='💾 حفظ الإعدادات'; return; }
   } else {
     const file = document.getElementById('cert_img_file')?.files[0];
     if (file) {
       document.getElementById('cert_img_prog_wrap').style.display = 'block';
       imageUrl = await uploadFile(file, 'certificates', 'cert_img_prog');
     } else {
       // Keep existing
       const existing = await fbGet('settings/certificate');
       imageUrl = existing?.imageUrl || '';
       if (!imageUrl) { errEl.textContent = '⚠️ اختر صورة الشهادة'; errEl.style.display='block'; btn.disabled=false; btn.textContent='💾 حفظ الإعدادات'; return; }
     }
   }
   const cfg = {
     imageUrl,
     useUrl: isUrl,
     nameX:      parseFloat(document.getElementById('cert_name_x')?.value) || 50,
     nameY:      parseFloat(document.getElementById('cert_name_y')?.value) || 58,
     fontSize:   parseInt(document.getElementById('cert_font_size')?.value) || 48,
     fontColor:  document.getElementById('cert_font_color')?.value || '#1a1a1a',
     fontFamily: document.getElementById('cert_font_family')?.value || 'Cairo',
   };
   await fbSet('settings/certificate', cfg);

async function downloadCertificate(courseId) {
 const course = COURSES.find(c => c.id === courseId);
 if (!course) return;

 // Load cert settings
 const cfg = await fbGet('settings/certificate');
 if (!cfg?.imageUrl) {
   // Fallback to built-in PDF if no template set
   showToast('ℹ️','لم يتم إعداد قالب الشهادة بعد. يتم إنشاء شهادة افتراضية...','var(--blue)');
   await downloadDefaultCertificate(course);
   return;
 }

 showToast('⏳','جاري إنشاء الشهادة...','var(--blue)');
 try {
   // Try loading with CORS first, then without
   const img = new Image();
   let loaded = false;
   // Attempt 1: with crossOrigin (needed for canvas export)
   await new Promise((res) => {
     img.crossOrigin = 'anonymous';
     img.onload = () => { loaded = true; res(); };
     img.onerror = () => res(); // don't reject, try fallback
     img.src = cfg.imageUrl + (cfg.imageUrl.includes('?') ? '&' : '?') + '_nc=' + Date.now();
     setTimeout(res, 8000); // timeout 8s
   });
   // Attempt 2: without crossOrigin if first failed
   if (!loaded) {
     await new Promise((res, rej) => {
       const img2 = new Image();
       img2.onload = () => { img.src = img2.src; loaded = true; res(); };
       img2.onerror = rej;
       img2.src = cfg.imageUrl;
       setTimeout(() => rej(new Error('timeout')), 8000);
     });
   }
   if (!loaded || !img.naturalWidth) throw new Error('فشل تحميل صورة القالب');

   const canvas = document.createElement('canvas');
   canvas.width  = img.naturalWidth  || 1200;
   canvas.height = img.naturalHeight || 800;
   const ctx = canvas.getContext('2d');

   // Draw template
   try { ctx.drawImage(img, 0, 0); } catch(corsErr) {
     // CORS tainted — download default instead
     throw new Error('CORS');
   }

   // Draw name
   const fontSize   = cfg.fontSize   || 48;
   const fontFamily = cfg.fontFamily || 'Cairo';
   ctx.font         = `bold ${fontSize}px "${fontFamily}", Cairo, sans-serif`;
   ctx.fillStyle    = cfg.fontColor  || '#1a1a1a';
   ctx.textAlign    = 'center';
   ctx.textBaseline = 'middle';
   const x = canvas.width  * ((cfg.nameX ?? 50) / 100);
   const y = canvas.height * ((cfg.nameY ?? 58) / 100);
   ctx.fillText(S.user.name || 'المتدرب', x, y);

   // Download as PNG
   let dataUrl;
   try { dataUrl = canvas.toDataURL('image/png'); }
   catch(e) { throw new Error('CORS'); }

   const link = document.createElement('a');
   link.download = 'Certificate_' + (S.user.name||'user').replace(/\s+/g,'_') + '_' + courseId + '.png';
   link.href = dataUrl;
   link.click();
   showToast('🎓','تم تنزيل الشهادة!','var(--xp)');
 } catch(e) {
   console.error('Certificate error:', e);
   if (e.message === 'CORS') {
     showToast('⚠️','الصورة لا تدعم CORS — يتم إنشاء شهادة افتراضية...','var(--amber)');
   } else {
     showToast('⚠️','مشكلة في قالب الشهادة، يتم إنشاء شهادة افتراضية...','var(--amber)');
   }
   await downloadDefaultCertificate(course);
 }
}

async function startExam(courseId, lessonId) {
 const course = COURSES.find(c => c.id === courseId);
 const lesson = (course?.lessons||[]).find(l => l.id === lessonId);
 if (!lesson?.exam) return;

 // Check attempts
 const attempts = (S.user.examAttempts || {})[lessonId] || [];
 const maxA = lesson.exam.maxAttempts || 0;
 if (maxA > 0 && attempts.length >= maxA) {
   showToast('❌','تجاوزت الحد المسموح من المحاولات','var(--red)');
   return;
 }

 // Check for saved progress
 let savedAnswers = [];
 try {
   const saved = await fbGet('examProgress/' + S.ukey + '/' + lessonId);
   if (saved && saved.answers) savedAnswers = saved.answers;
 } catch(e) {}

 const examTime = lesson.exam.examTime || 0; // minutes, 0 = no limit
 const endTime = examTime > 0 ? Date.now() + examTime * 60 * 1000 : null;

 S.currentExam = {
   courseId, lessonId,
   questions: lesson.exam.questions,
   passScore: lesson.exam.passScore,
   currentQ: 0,
   answers: savedAnswers,
   endTime,
   examTime,
 };

 // Clear old timer
 if (S._examTimerInterval) { clearInterval(S._examTimerInterval); S._examTimerInterval = null; }

 if (endTime) {
   S._examTimerInterval = setInterval(() => {
     const remaining = endTime - Date.now();
     if (remaining <= 0) {
       clearInterval(S._examTimerInterval);
       S._examTimerInterval = null;
       showToast('⏰','انتهى الوقت! يتم تسليم إجاباتك تلقائياً','var(--amber)');
       submitExam();
       return;
     }
     updateTimerDisplay(remaining);
   }, 1000);
 }

 setState({ screen: 'exam' });
}

function updateTimerDisplay(remaining) {
 const el = document.getElementById('examTimerDisplay');
 if (!el) return;
 const mins = Math.floor(remaining / 60000);
 const secs = Math.floor((remaining % 60000) / 1000);
 const str = `⏱ ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
 el.textContent = str;
 const wrap = el.closest('.exam-timer');
 if (wrap) {
   wrap.className = 'exam-timer' + (mins < 1 ? ' danger' : mins < 3 ? ' warning' : '');
 }
}

 if (!S.currentExam) return `<div>لا يوجد اختبار حالي.</div>`;
 const ex = S.currentExam;
 const q = ex.questions[ex.currentQ];
 const course = COURSES.find(c => c.id === ex.courseId);
 const remaining = ex.endTime ? ex.endTime - Date.now() : null;
 const mins = remaining !== null ? Math.floor(remaining / 60000) : null;
 const secs = remaining !== null ? Math.floor((remaining % 60000) / 1000) : null;

 return `<div class="fu">
 <div class="topbar">

 ${ex.endTime ? `<div class="exam-timer${mins < 1 ? ' danger' : mins < 3 ? ' warning' : ''}" id="examTimerWrap">

async function pickOpt(i) {
 S.currentExam.answers[S.currentExam.currentQ] = i;
 // Progressive save
 try {
   await fbSet('examProgress/' + S.ukey + '/' + S.currentExam.lessonId, {
     answers: S.currentExam.answers,
     currentQ: S.currentExam.currentQ,
     timestamp: Date.now(),
   });
 } catch(e) {}
 renderApp();
}

function nextQuestion() { S.currentExam.currentQ++; renderApp(); }
function prevQuestion() { S.currentExam.currentQ--; renderApp(); }

async function cancelExam() {
 if (S._examTimerInterval) { clearInterval(S._examTimerInterval); S._examTimerInterval = null; }
 // Keep progress saved for resuming
 setState({ screen: 'course', courseId: S.currentExam?.courseId });
}

async function submitExam() {
 const ex = S.currentExam; if (!ex) return;
 if (S._examTimerInterval) { clearInterval(S._examTimerInterval); S._examTimerInterval = null; }

 let correct = 0;
 ex.questions.forEach((q,i) => { if (ex.answers[i] === q.ans) correct++; });
 ex.score = Math.round((correct / ex.questions.length) * 100);

 const attemptData = {
   score: ex.score,
   correct,
   total: ex.questions.length,
   date: new Date().toLocaleDateString('ar-EG'),
   timestamp: Date.now(),
   courseId: ex.courseId,
   answers: [...ex.answers],
 };

 // Save all attempts
 if (!S.user.examAttempts) S.user.examAttempts = {};
 if (!S.user.examAttempts[ex.lessonId]) S.user.examAttempts[ex.lessonId] = [];
 S.user.examAttempts[ex.lessonId].push(attemptData);

 // Save latest result
 if (!S.user.examResults) S.user.examResults = {};
 S.user.examResults[ex.lessonId] = { score: ex.score, correct, total: ex.questions.length, date: attemptData.date, courseId: ex.courseId };
 if (!S.user.scores) S.user.scores = {};
 S.user.scores[ex.courseId] = ex.score;

 if (ex.score >= ex.passScore) {
   if (!S.user.progress[ex.courseId]) S.user.progress[ex.courseId] = {};
   S.user.progress[ex.courseId][ex.lessonId] = 100;
   const course = COURSES.find(c => c.id === ex.courseId);
   const lesson = (course?.lessons||[]).find(l => l.id === ex.lessonId);
   await gainXP(lesson?.xp || 20);
   launchConfetti();
   playExamPassSound();
   if (ex.score === 100 && !S.user.badges.includes('exam_ace')) {
     S.user.badges.push('exam_ace');
     setTimeout(() => showToast('🎯','شارة جديدة: "متفوق في الامتحانات"!','var(--xp)'), 800);
   }
 } else {
   playErrorSound();
 }

 // Clear progress save, update Firebase
 await fbSet('examProgress/' + S.ukey + '/' + ex.lessonId, null).catch(()=>{});
 await fbUpdate('users/' + S.ukey, {
   scores: S.user.scores,
   progress: S.user.progress,
   badges: S.user.badges,
   examResults: S.user.examResults,
   examAttempts: S.user.examAttempts,
 });

 setState({ screen: 'result', examResult: { ...ex } });
}

async function exportScoresExcel() {
 const allUsers = await fbGet('users') || {};
 const emps = Object.entries(allUsers).filter(([,v]) => v.role==='employee');
 const examLessons = [];
 COURSES.forEach(c => (c.lessons||[]).forEach(l => {
   if (l.type === 'امتحان') examLessons.push({ courseTitle: c.title, lessonTitle: l.title, lessonId: l.id, passScore: l.exam?.passScore || 60 });
 }));
 const BOM = '\uFEFF';
 const headers = ['اسم المتدرب','اسم الدخول',...examLessons.map(e=>e.lessonTitle+' (درجة)'),...examLessons.map(e=>e.lessonTitle+' (حالة)')];
 const rows = emps.map(([key,u]) => {
   const scores = examLessons.map(ex => { const r = (u.examResults||{})[ex.lessonId]; return r ? r.score+'%' : '—'; });
   const statuses = examLessons.map(ex => { const r = (u.examResults||{})[ex.lessonId]; if (!r) return 'لم يأدِ'; return r.score>=ex.passScore?'نجح':'رسب'; });
   return [u.name||'—',key,...scores,...statuses];
 });
 let csv = BOM+headers.join(',')+'\n'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
 const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a'); a.href=url; a.download='exam_scores_'+Date.now()+'.csv'; a.click(); URL.revokeObjectURL(url);
 showToast('📥','تم تصدير درجات الامتحانات!');
}

   if (vcEl) new Chart(vcEl, {

     options: { responsive: true, maintainAspectRatio: false, ...chartDefaults },
   });

   const scEl = document.getElementById('scoresChart');
   const hasScores = scoreRanges.some(r => r.count > 0);
   if (scEl) new Chart(scEl, {
     type: 'doughnut',
     data: {

     },
     options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#9aa5b8', font: { family: 'Cairo' } } } } },
   });

   const lvEl = document.getElementById('levelsChart');
   if (lvEl) new Chart(lvEl, {
     type: 'bar',
     data: {

     },
     options: { responsive: true, maintainAspectRatio: false, ...chartDefaults },
   });
 } catch(e) { console.error('Chart error:', e); }

     </div>

function renderQuestionCard(prefix, q, qi) {
 const letters = ['أ', 'ب', 'ج', 'د'];
 const numOptions = q.numOptions || (q.options||[]).length || 4;
 const options = q.options || [];
 while (options.length < numOptions) options.push('');
 return `
   <div class="question-card" id="${prefix}_q_${qi}">
     <div class="q-num">س ${qi+1}</div>
     <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px">
       <input class="inp" style="flex:1" placeholder="نص السؤال..." value="${(q.q||'').replace(/"/g,'&quot;')}"
         oninput="S.examQuestions[${qi}].q=this.value"/>
       ${S.examQuestions.length > 1 ? `<button class="btn btn-ghost btn-sm" style="color:#ff4444;flex-shrink:0" onclick="removeExamQuestion(${qi},'${prefix}')">🗑️</button>` : ''}
     </div>
     <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
       <div style="font-size:11px;color:var(--muted2);white-space:nowrap">عدد الاختيارات:</div>
       ${[2,3,4].map(n => `<button class="btn btn-sm ${numOptions===n?'btn-red':'btn-ghost'}" onclick="setQuestionOptions(${qi},${n},'${prefix}')" style="padding:4px 10px;font-size:11px">${n}</button>`).join('')}
     </div>
     <div style="font-size:10px;color:var(--muted2);font-weight:800;margin-bottom:8px">اختيارات الإجابة — اختر الصحيحة:</div>
     ${options.slice(0, numOptions).map((opt, oi) => `
       <div class="opt-row">
         <input type="radio" name="${prefix}_q${qi}_ans" ${q.ans===oi?'checked':''} onchange="S.examQuestions[${qi}].ans=${oi};refreshExamBuilder('${prefix}')"/>
         <div class="opt-letter">${letters[oi]}</div>
         <input class="inp" style="flex:1" placeholder="الاختيار ${letters[oi]}..." value="${(opt||'').replace(/"/g,'&quot;')}"
           oninput="S.examQuestions[${qi}].options[${oi}]=this.value"/>
         ${q.ans===oi ? `<span class="correct-badge">✅ صحيح</span>` : ''}
       </div>
     `).join('')}
   </div>`;
}

function setQuestionOptions(qi, num, prefix) {
 S.examQuestions[qi].numOptions = num;
 while (S.examQuestions[qi].options.length < num) S.examQuestions[qi].options.push('');
 if (S.examQuestions[qi].ans >= num) S.examQuestions[qi].ans = 0;
 refreshExamBuilder(prefix);
}

function refreshExamBuilder(prefix) {
 const container = document.getElementById(prefix + '_questions_container');
 if (container) container.innerHTML = S.examQuestions.map((q, qi) => renderQuestionCard(prefix, q, qi)).join('');
}

function addExamQuestion(prefix) {
 S.examQuestions.push({ q: '', options: ['', '', '', ''], numOptions: 4, ans: 0 });
 refreshExamBuilder(prefix);
}

function removeExamQuestion(qi, prefix) {
 S.examQuestions.splice(qi, 1);
 refreshExamBuilder(prefix);
}

function collectExamData(prefix) {
 const passScore = parseInt(document.getElementById(prefix + '_pass_score')?.value, 10) || 60;
 const examTime = parseInt(document.getElementById(prefix + '_exam_time')?.value, 10) || 0;
 const maxAttempts = parseInt(document.getElementById(prefix + '_max_attempts')?.value, 10) || 0;
 const questions = S.examQuestions.map((q, qi) => {
   const qInput = document.querySelector(`#${prefix}_q_${qi} input.inp`);
   const qText = qInput ? qInput.value.trim() : q.q;
   const numOpts = q.numOptions || 4;
   const optInputs = document.querySelectorAll(`#${prefix}_q_${qi} .opt-row input.inp`);
   const options = Array.from(optInputs).map(i => i.value.trim()).slice(0, numOpts);
   return { q: qText || q.q, options: options.length > 0 ? options : q.options.slice(0, numOpts), ans: q.ans, numOptions: numOpts };
 });
 return { questions, passScore, examTime, maxAttempts };
}

function toggleLessonFields(prefix) {
const type = document.getElementById(prefix+'_type')?.value;
const allSections = [prefix+'_yt_section',prefix+'_pdf_section',prefix+'_img_section',prefix+'_ppt_section',prefix+'_aud_section',prefix+'_file_section',prefix+'_exam_section'];
const map = { 'فيديو':prefix+'_yt_section','نص':prefix+'_pdf_section','صورة':prefix+'_img_section','بوربوينت':prefix+'_ppt_section','صوت':prefix+'_aud_section','ملف':prefix+'_file_section','امتحان':prefix+'_exam_section' };
allSections.forEach(id => { const el = document.getElementById(id); if (el) el.style.display='none'; });
const target = map[type];
if (target) { const el = document.getElementById(target); if (el) el.style.display='block'; }
if (type==='امتحان' && (!S.examQuestions || S.examQuestions.length===0)) { initExamBuilder(); refreshExamBuilder(prefix); }
}

function previewFile(input, previewId, type) {
const file = input.files[0]; if (!file) return;
const prev = document.getElementById(previewId); if (!prev) return;
const sizeMB = (file.size/1024/1024).toFixed(1);
if (type==='image') { prev.src=URL.createObjectURL(file); prev.style.display='block'; }
else if (type==='video') { prev.src=URL.createObjectURL(file); prev.style.display='block'; }
else if (type==='audio') { prev.innerHTML=`<audio controls style="width:100%;border-radius:8px" src="${URL.createObjectURL(file)}"></audio><div style="font-size:11px;color:var(--muted2);margin-top:4px;text-align:center">✅ ${file.name} (${sizeMB} MB)</div>`; prev.style.display='block'; }
else { const ext=file.name.split('.').pop().toUpperCase(); const icons={PDF:'📄',DOC:'📝',DOCX:'📝',XLS:'📊',XLSX:'📊',ZIP:'🗜️',PPT:'📊',PPTX:'📊'}; prev.textContent=(icons[ext]||'📎')+' '+file.name+' ('+sizeMB+' MB)'; prev.style.display='block'; }
}

async function saveNewLesson(courseId) {
const course = COURSES.find(c => c.id===courseId); if (!course) return;
const title    = document.getElementById('nl_t')?.value.trim();
const type     = document.getElementById('nl_type')?.value;
const desc     = document.getElementById('nl_d')?.value.trim();
const duration = document.getElementById('nl_dur')?.value.trim();
const xp       = parseInt(document.getElementById('nl_xp')?.value,10) || 10;
const saveBtn  = document.getElementById('nl_save_btn');
if (!title || !duration) { showToast('⚠️','اكتب عنوان الدرس والمدة','var(–amber)'); return; }
if (type==='امتحان') {
const ed = collectExamData('nl');
for (let i=0; i<ed.questions.length; i++) {
const q = ed.questions[i];
if (!q.q) { showToast('⚠️','اكتب نص السؤال '+(i+1),'var(–amber)'); return; }
if (q.options.some(o=>!o)) { showToast('⚠️','اكتب جميع الاختيارات في السؤال '+(i+1),'var(–amber)'); return; }
}
}
const newLesson = { id:'l'+Date.now(), title, type, desc, duration, xp, yt:'', pdf:'', img:'', ppt:'', audio:'', file:'', fileName:'' };
try {
if (saveBtn) { saveBtn.disabled=true; saveBtn.textContent='جاري الحفظ...'; }
if (type==='امتحان') { newLesson.exam = collectExamData('nl'); }
else if (type==='فيديو') {
const ytUrl=document.getElementById('nl_yt')?.value.trim();
const vidFile=document.getElementById('nl_vid_file')?.files[0];
if (vidFile) { document.getElementById('nl_vid_prog_wrap').style.display='block'; newLesson.yt=await uploadFile(vidFile,'videos','nl_vid_prog'); }
else if (ytUrl) newLesson.yt=normalizeYouTubeUrl(ytUrl);
} else if (type==='نص') {
const pdfUrl=document.getElementById('nl_pdf')?.value.trim();
const pdfFile=document.getElementById('nl_pdf_file')?.files[0];
if (pdfFile) { document.getElementById('nl_pdf_prog_wrap').style.display='block'; newLesson.pdf=await uploadFile(pdfFile,'pdfs','nl_pdf_prog'); }
else if (pdfUrl) newLesson.pdf=pdfUrl;
} else if (type==='صورة') {
const imgFile=document.getElementById('nl_img_file')?.files[0];
if (imgFile) { document.getElementById('nl_img_prog_wrap').style.display='block'; newLesson.img=await uploadFile(imgFile,'images','nl_img_prog'); }
} else if (type==='بوربوينت') {
const pptFile=document.getElementById('nl_ppt_file')?.files[0];
if (pptFile) { document.getElementById('nl_ppt_prog_wrap').style.display='block'; newLesson.ppt=await uploadFile(pptFile,'presentations','nl_ppt_prog'); newLesson.fileName=pptFile.name; }
} else if (type==='صوت') {
const audFile=document.getElementById('nl_aud_file')?.files[0];
if (audFile) { document.getElementById('nl_aud_prog_wrap').style.display='block'; newLesson.audio=await uploadFile(audFile,'audio','nl_aud_prog'); newLesson.fileName=audFile.name; }
} else if (type==='ملف') {
const anyFile=document.getElementById('nl_any_file')?.files[0];
if (anyFile) { document.getElementById('nl_file_prog_wrap').style.display='block'; newLesson.file=await uploadFile(anyFile,'files','nl_file_prog'); newLesson.fileName=anyFile.name; }
}

course.lessons[idx] = {

audio: type!=='امتحان' ? (document.getElementById('el_audio')?.value.trim()||'') : '',

async function saveChangePass() {
const oldP=document.getElementById('cp_old')?.value; const newP=document.getElementById('cp_new')?.value; const conP=document.getElementById('cp_con')?.value;
const errEl=document.getElementById('cp_err'); errEl.style.display='none';
if (!oldP||!newP||!conP) { errEl.textContent='⚠️ أكمل كل الحقول'; errEl.style.display='block'; return; }
if (newP.length<6) { errEl.textContent='⚠️ كلمة السر 6 أحرف على الأقل'; errEl.style.display='block'; return; }
if (newP!==conP) { errEl.textContent='⚠️ كلمة السر مش متطابقة'; errEl.style.display='block'; return; }
try {
const user=auth.currentUser;
const cred=firebase.auth.EmailAuthProvider.credential(user.email, oldP);
await user.reauthenticateWithCredential(cred);
await user.updatePassword(newP);
closeModal(); showToast('✅','تم تغيير كلمة السر بنجاح');
} catch(e) {
const msgs={'auth/wrong-password':'❌ كلمة السر الحالية غلط','auth/weak-password':'❌ كلمة السر ضعيفة'};
errEl.textContent=msgs[e.code]||'❌ خطأ: '+e.message; errEl.style.display='block';
}
}

// ============================================================
// NOTIFICATIONS & LOGGING
// ============================================================
async function logLogin(username, prevData) {
const today=new Date().toLocaleDateString('ar-EG');
const updates={lastLogin:today};
const lastDate=prevData?.lastLogin;
if (lastDate) {
const last=new Date(lastDate.split('/').reverse().join('-'));
const diff=Math.floor((new Date()-last)/86400000);
if (diff===1) {
updates.streak=(prevData.streak||0)+1; S.user.streak=updates.streak;
if (updates.streak>=7&&!S.user.badges.includes('streak_7')) {
S.user.badges.push('streak_7'); updates.badges=S.user.badges;
setTimeout(()=>showToast('🔥','حصلت على شارة “سلسلة 7 أيام”!','var(–xp)'),1200);
}
} else if (diff>1) { updates.streak=1; S.user.streak=1; }
} else { updates.streak=1; S.user.streak=1; }
await fbUpdate('users/'+username, updates);
await fbSet('loginLogs/'+username+'_'+Date.now(), {user:username, time:new Date().toISOString()});
}

async function loadNotification(username) {
const userData=await fbGet('users/'+username);
S.notification=(userData?.notification&&!userData.notification.read)?userData.notification:null;
}

async function dismissNotification() {
S.notification=null; await fbUpdate('users/'+S.ukey,{'notification/read':true}); renderApp();
}

async function notifyLate() {
const allUsers=await fbGet('users')||{};
const emps=Object.entries(allUsers).filter(([,v])=>v.role==='employee');
const late=emps.filter(([,u])=>getProgPct(u)<30);
if (late.length===0) { showToast('✅','لا يوجد متدربين متأخرين!'); return; }
const now=new Date().toLocaleDateString('ar-EG');
await Promise.all(late.map(([key])=>fbUpdate('users/'+key,{notification:{msg:'⚠️ تنبيه: لم تكمل الكورسات المطلوبة بعد. يرجى الاستمرار في التعلم.',from:S.name,date:now,read:false}})));
showToast('🔔','تم إرسال تنبيه لـ '+late.length+' متدرب');
}

// ============================================================
// EXPORT EXCEL
// ============================================================
async function exportExcel() {
showToast('⏳','جاري تحضير ملف Excel...','var(–blue)');
// Lazy load SheetJS
if (!window.XLSX) {
await new Promise((res,rej)=>{
const s=document.createElement('script');
s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
s.onload=res; s.onerror=rej; document.head.appendChild(s);
});
}
const allUsers=await fbGet('users')||{};
let emps=Object.entries(allUsers).filter(([,v])=>v.role==='employee');
if (S.role==='tracker') emps=emps.filter(([,u])=>u.trainerId===S.ukey);
const wb = XLSX.utils.book_new();

// ── Sheet 1: ملخص المتدربين ──
const summaryHeaders=['الاسم','اسم الدخول','المستوى','الرتبة','XP','متوسط الدرجات','التقدم الكلي %','عدد الشارات','السلسلة','الحالة','المدرب المسؤول'];
const summaryRows=emps.map(([key,u])=>{
const scores=Object.values(u.scores||{});
const avg=scores.length>0?Math.round(scores.reduce((a,v)=>a+v,0)/scores.length):0;
const pct=getProgPct(u);
const trainerName=u.trainerId?(allUsers[u.trainerId]||{}).name||u.trainerId:'—';
return [u.name||'—',key,u.level||1,getLevelName(u.level||1),u.xp||0,avg,pct,(u.badges||[]).length,u.streak||0,u.status||'offline',trainerName];
});
const ws1=XLSX.utils.aoa_to_sheet([summaryHeaders,...summaryRows]);
// Style header row widths
ws1['!cols']=[{wch:20},{wch:18},{wch:8},{wch:14},{wch:8},{wch:14},{wch:14},{wch:12},{wch:10},{wch:12},{wch:18}];
XLSX.utils.book_append_sheet(wb, ws1, 'ملخص المتدربين');

// ── Sheet 2: نتائج الاختبارات ──
const examHeaders=['اسم المتدرب','اسم الدخول','الكورس','الدرس','أحدث نتيجة %','عدد المحاولات','نجح/رسب'];
const examRows=[];
emps.forEach(([key,u])=>{
const attempts=u.examAttempts||{};
const scores=u.scores||{};
COURSES.forEach(c=>{
c.lessons?.filter(l=>l.type==='exam').forEach(l=>{
const lid=l.id||l.title;
const att=Array.isArray(attempts[lid])?attempts[lid]:[];
const latestScore=scores[lid]??'—';
const passed=typeof latestScore==='number'?(latestScore>=(l.exam?.passScore||70)?'✅ نجح':'❌ رسب'):'—';
if(att.length>0||typeof latestScore==='number'){
examRows.push([u.name||'—',key,c.title,l.title,latestScore,att.length,passed]);
}
});
});
});
const ws2=XLSX.utils.aoa_to_sheet([examHeaders,...examRows]);
ws2['!cols']=[{wch:20},{wch:16},{wch:22},{wch:24},{wch:14},{wch:14},{wch:12}];
XLSX.utils.book_append_sheet(wb, ws2, 'نتائج الاختبارات');

// ── Sheet 3: تقدم الكورسات ──
const courseHeaders=['اسم المتدرب','اسم الدخول',...COURSES.map(c=>c.title+' %'),'الإجمالي %'];
const courseRows=emps.map(([key,u])=>{
const perCourse=COURSES.map(c=>getCourseProgress(u,c.id));
return [u.name||'—',key,...perCourse,getProgPct(u)];
});
const ws3=XLSX.utils.aoa_to_sheet([courseHeaders,...courseRows]);
ws3['!cols']=[{wch:20},{wch:16},...COURSES.map(()=>({wch:18})),{wch:12}];
XLSX.utils.book_append_sheet(wb, ws3, 'تقدم الكورسات');

// Download
const date=new Date().toISOString().slice(0,10);
XLSX.writeFile(wb,'eand_academy_report_'+date+'.xlsx');
showToast('📥','تم تصدير Excel بنجاح! (3 شيتات)','var(–xp)');
}

// ============================================================
// onAuthStateChanged
// ============================================================
const _loadingTimeout=setTimeout(()=>{
const el=document.getElementById('loadingScreen');
if (el&&el.style.display!=='none') { el.style.display='none'; if(!S._loggedIn) renderApp(); }
},2500);

auth.onAuthStateChanged(async(firebaseUser)=>{
clearTimeout(_loadingTimeout);
const el=document.getElementById('loadingScreen'); if (el) el.style.display='none';
if (S._loginInProgress) return;
if (firebaseUser&&!S._loggedIn) {
const username=firebaseUser.email.split('@')[0];
const userData=await fbGet('users/'+username);
if (userData) { S._loggedIn=true; await afterLogin(username,userData); }
else { await auth.signOut(); renderApp(); }
} else if (!firebaseUser) { S._loggedIn=false; renderApp(); }
});

applyTheme();
applyTranslations();
